name: Unity Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Unity Test Runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v5
      with:
        lfs: true

    - uses: actions/checkout@v5
      with:
        repository: ayutaz/dot-net-g2p
        ref: main
        path: dot-net-g2p

    - name: Fix local package paths for CI
      shell: bash
      run: sed -i 's|file:../../dot-net-g2p/src|file:../dot-net-g2p/src|g' Packages/manifest.json

    - name: Cache Library
      uses: actions/cache@v5
      with:
        path: Library
        key: Library-Test-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
        restore-keys: |
          Library-Test-
          Library-

    - name: Extract MeCab dictionary
      shell: bash
      run: |
        cd Assets/StreamingAssets/uPiper/OpenJTalk
        mkdir -p naist_jdic/open_jtalk_dic_utf_8-1.11
        unzip -o naist_jdic.zip -d naist_jdic/open_jtalk_dic_utf_8-1.11/

    - name: Run Unity Tests
      uses: game-ci/unity-test-runner@v4
      env:
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        unityVersion: 6000.0.58f2
        testMode: all
        artifactsPath: test-results
        githubToken: ${{ github.token }}
        checkName: Unity Test Results
        # NOTE: coverageOptionsはセミコロン区切りの各オプション前にスペースを入れてはならない
        # (Unity Code Coverageパーサーが認識しないため)
        coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+uPiper.Runtime;pathFilters:+**/Assets/uPiper/Runtime/**,-**/Assets/uPiper/Runtime/Demo/**,-**/Assets/uPiper/Runtime/Core/IL2CPP/**,-**/Assets/uPiper/Runtime/Core/Performance/**,-**/Assets/uPiper/Runtime/Core/Phonemizers/Unity/**,-**/Assets/uPiper/Runtime/Core/Phonemizers/Licenses/**,-**/Assets/uPiper/Runtime/Core/Phonemizers/Data/**,-**/IndexedDBCache.cs,-**/WebGLStreamingAssetsLoader.cs,-**/WebGLLoadingPanel.cs,-**/WebGLInteractionGate.cs,-**/IOSAudioSessionHelper.cs,-**/InferenceAudioGenerator.cs,-**/UnityMainThreadDispatcher.cs,-**/FliteLTSData.Generated.cs'
        customParameters: '-debugCodeOptimization -enableCodeCoverage'

    - name: Fix coverage file permissions
      if: always()
      run: |
        for dir in test-results CodeCoverage; do
          if [ -d "$dir" ]; then
            sudo chown -R $(id -u):$(id -g) "$dir"
          fi
        done

    - name: Setup .NET for ReportGenerator
      if: always()
      uses: actions/setup-dotnet@v4

    - name: Generate Coverage Report
      if: always()
      uses: danielpalme/ReportGenerator-GitHub-Action@v5
      with:
        reports: 'CodeCoverage/**/TestCoverageResults_*.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;MarkdownSummaryGithub;Cobertura'
        assemblyfilters: '+uPiper.Runtime'
        customSettings: 'minimumCoverageThresholds:lineCoverage=60'

    - name: Coverage Summary
      if: always()
      run: |
        if [ -f coveragereport/SummaryGithub.md ]; then
          cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Coverage report not generated" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Test Results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: Test Results
        path: test-results/
        retention-days: 7

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: Coverage Report
        path: coveragereport/
        retention-days: 14
