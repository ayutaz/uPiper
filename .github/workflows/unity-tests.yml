name: Unity Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Unity Test Runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v5
      with:
        lfs: true

    - uses: actions/checkout@v5
      with:
        repository: ayutaz/dot-net-g2p
        ref: main
        path: dot-net-g2p

    - name: Fix local package paths for CI
      shell: bash
      run: sed -i 's|file:../../dot-net-g2p/src|file:../dot-net-g2p/src|g' Packages/manifest.json

    - name: Cache Library
      uses: actions/cache@v5
      with:
        path: Library
        key: Library-Test-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
        restore-keys: |
          Library-Test-
          Library-

    - name: Run Unity Tests
      uses: game-ci/unity-test-runner@v4
      env:
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        unityVersion: 6000.0.58f2
        testMode: all
        artifactsPath: test-results
        githubToken: ${{ github.token }}
        checkName: Unity Test Results
        coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+uPiper.*,-uPiper.Tests.*'
        customParameters: '-enableCodeCoverage'

    - name: Upload Test Results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: Test Results
        path: test-results/
        retention-days: 7
