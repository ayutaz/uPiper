name: Unity Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      buildWindows:
        description: 'Build for Windows'
        required: false
        default: 'true'
        type: boolean
      buildMacOS:
        description: 'Build for macOS'
        required: false
        default: 'true'
        type: boolean
      buildLinux:
        description: 'Build for Linux'
        required: false
        default: 'true'
        type: boolean
      buildAndroid:
        description: 'Build for Android'
        required: false
        default: 'true'
        type: boolean
      useIL2CPP:
        description: 'Use IL2CPP backend'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneOSX
          - StandaloneLinux64
          - WebGL
          # - Android  # Temporarily disabled due to Unity licensing issues
    
    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - uses: actions/checkout@v6
      with:
        repository: ayutaz/dot-net-g2p
        ref: v1.8.2
        path: dot-net-g2p

    - name: Fix local package paths for CI
      shell: bash
      run: sed -i 's|file:../../dot-net-g2p/src|file:../dot-net-g2p/src|g' Packages/manifest.json

    - name: Cache Library
      uses: actions/cache@v5
      with:
        path: Library
        key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
        restore-keys: |
          Library-${{ matrix.targetPlatform }}-
          Library-

    # Free up disk space for Unity builds
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: false
        android: ${{ matrix.targetPlatform != 'Android' }}
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # Configure Unity License timeout for service delays
    - name: Configure Unity License Timeout (Extended for Service Delays)
      if: matrix.targetPlatform == 'Android'
      run: |
        sudo mkdir -p /usr/share/unity3d/config/
        sudo tee /usr/share/unity3d/config/services-config.json > /dev/null << 'EOF'
        {
          "clientConnectTimeoutSec": 30,
          "clientHandshakeTimeoutSec": 60,
          "clientResolveEntitlementsTimeoutSec": 90,
          "clientUpdateLicenseTimeoutSec": 90,
          "licensingServiceBaseUrl": "",
          "enableProxyAutoconfig": "false"
        }
        EOF
        echo "Unity License timeout configuration updated:"
        cat /usr/share/unity3d/config/services-config.json

    # Unity Builder を使用してビルド (Android)
    - name: Build Unity project (Android)
      if: matrix.targetPlatform == 'Android'
      uses: game-ci/unity-builder@v4
      env:
        CI: "true"
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        unityVersion: 6000.0.58f2
        targetPlatform: ${{ matrix.targetPlatform }}
        buildName: uPiper${{ github.event_name == 'workflow_dispatch' && github.event.inputs.useIL2CPP == 'true' && '-IL2CPP' || '' }}
        buildsPath: build
        androidAppBundle: false
        androidKeystoreName: ''
        androidKeystorePass: ''
        androidKeyaliasName: ''
        androidKeyaliasPass: ''
        buildMethod: UnityBuilderAction.BuildScript.Build
        allowDirtyBuild: true
        customParameters: -scriptingBackend ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.useIL2CPP == 'true' && 'IL2CPP' || 'Mono2x' }}

    # Configure Unity License timeout for service delays
    - name: Configure Unity License Timeout (Extended for Service Delays)
      if: matrix.targetPlatform != 'Android'
      run: |
        sudo mkdir -p /usr/share/unity3d/config/
        sudo tee /usr/share/unity3d/config/services-config.json > /dev/null << 'EOF'
        {
          "clientConnectTimeoutSec": 30,
          "clientHandshakeTimeoutSec": 60,
          "clientResolveEntitlementsTimeoutSec": 90,
          "clientUpdateLicenseTimeoutSec": 90,
          "licensingServiceBaseUrl": "",
          "enableProxyAutoconfig": "false"
        }
        EOF
        echo "Unity License timeout configuration updated:"
        cat /usr/share/unity3d/config/services-config.json

    # Unity Builder を使用してビルド (Non-Android)
    - name: Build Unity project (Non-Android)
      if: matrix.targetPlatform != 'Android'
      uses: game-ci/unity-builder@v4
      env:
        CI: "true"
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        unityVersion: 6000.0.58f2
        targetPlatform: ${{ matrix.targetPlatform }}
        buildName: uPiper${{ github.event_name == 'workflow_dispatch' && github.event.inputs.useIL2CPP == 'true' && '-IL2CPP' || '' }}
        buildsPath: build
        buildMethod: UnityBuilderAction.BuildScript.Build
        allowDirtyBuild: true
        customParameters: -scriptingBackend ${{ matrix.targetPlatform == 'WebGL' && 'IL2CPP' || (github.event_name == 'workflow_dispatch' && github.event.inputs.useIL2CPP == 'true' && 'IL2CPP' || 'Mono2x') }}

    # ビルド成果物をアップロード
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: Build-${{ matrix.targetPlatform }}
        path: build/${{ matrix.targetPlatform }}
        retention-days: 7

  # .unitypackageエクスポート（タグプッシュ時）
  export-unitypackage:
    name: Export .unitypackage
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - uses: actions/checkout@v6
      with:
        repository: ayutaz/dot-net-g2p
        ref: v1.8.2
        path: dot-net-g2p

    - name: Fix local package paths for CI
      shell: bash
      run: sed -i 's|file:../../dot-net-g2p/src|file:../dot-net-g2p/src|g' Packages/manifest.json

    - name: Cache Library
      uses: actions/cache@v5
      with:
        path: Library
        key: Library-Export-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
        restore-keys: |
          Library-Export-
          Library-

    - name: Export .unitypackage
      uses: game-ci/unity-builder@v4
      env:
        CI: "true"
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        unityVersion: 6000.0.58f2
        targetPlatform: StandaloneLinux64
        buildMethod: uPiper.Editor.PackageExporter.ExportUnityPackageCI
        allowDirtyBuild: true

    - name: Upload .unitypackage artifact
      uses: actions/upload-artifact@v7
      with:
        name: UnityPackage
        path: ./Exports/*.unitypackage
        retention-days: 7

  # リリースへのビルド成果物アップロード（タグプッシュ時）
  upload-to-release:
    name: Upload Build Artifacts to Release
    needs: [build, export-unitypackage]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Extract version from tag
      id: version
      run: |
        TAG_NAME="${{ github.ref_name }}"
        VERSION="${TAG_NAME#v}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./artifacts

    - name: Package builds
      run: |
        cd artifacts
        for platform in Build-*; do
          if [ -d "$platform" ]; then
            echo "Packaging $platform"
            cd "$platform"
            zip -r "../${platform}.zip" .
            cd ..
          fi
        done

    - name: Upload to GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.version.outputs.tag_name }}"
        echo "Waiting for release $TAG to be created..."
        for i in $(seq 1 30); do
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release found!"
            break
          fi
          echo "Attempt $i: Release not found yet, waiting 30s..."
          sleep 30
        done
        for zip in artifacts/Build-*.zip; do
          if [ -f "$zip" ]; then
            echo "Uploading $zip"
            gh release upload "$TAG" "$zip" --repo "${{ github.repository }}" --clobber
          fi
        done
        for pkg in artifacts/UnityPackage/*.unitypackage; do
          if [ -f "$pkg" ]; then
            echo "Uploading $pkg"
            gh release upload "$TAG" "$pkg" --repo "${{ github.repository }}" --clobber
          fi
        done
