version: 2
updates:
  # GitHub Actions の依存関係を自動更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      # GitHub公式アクションをグループ化（1つのPRにまとめる）
      github-actions-official:
        patterns:
          - "actions/*"
      # GameCI関連をグループ化
      game-ci:
        patterns:
          - "game-ci/*"
